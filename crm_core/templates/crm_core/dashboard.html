<!DOCTYPE html>
<html>
<head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="card p-4">
            <h3>Employee Search</h3>
            <input type="text" id="searchPhone" class="form-control" placeholder="Search phone...">
            <button onclick="searchCustomer()" class="btn btn-primary mt-2">Search</button>
        </div>
    </div>
    <script>
        function searchCustomer() {
            const phone = document.getElementById('searchPhone').value;
            fetch(`?action=search_phone&phone=${phone}`, { headers: {'X-Requested-With': 'XMLHttpRequest'}})
            .then(r => r.json()).then(d => {
                if(d.status === 'success') { alert("Found: " + d.name); } 
                else { alert("Not Found"); }
            });
        }
    </script>
</body>
</html>
