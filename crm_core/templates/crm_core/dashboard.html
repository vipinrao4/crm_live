<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h3>Divjot CRM - Employee Portal</h3>
        <hr>
        <div class="card p-3 mb-3 bg-light">
            <input type="text" id="searchPhone" placeholder="Enter phone to search..." class="form-control">
            <button onclick="searchCustomer()" class="btn btn-primary mt-2">Search</button>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            <input type="text" id="c_name" name="customer_name" placeholder="Name" required>
            <input type="text" id="c_addr_line" name="address_line" placeholder="Address">
            <input type="text" id="phone1" name="phone1" placeholder="Phone">
            <button type="submit" class="btn btn-success">Save Order</button>
        </form>
    </div>

    <script>
        function searchCustomer() {
            const phone = document.getElementById('searchPhone').value;
            fetch(`?action=search_phone&phone=${phone}`, { headers: { 'X-Requested-With': 'XMLHttpRequest' }})
            .then(res => res.json())
            .then(data => {
                if(data.status === 'success') {
                    document.getElementById('c_name').value = data.name;
                    document.getElementById('c_addr_line').value = data.address;
                    document.getElementById('phone1').value = phone;
                    alert("Customer Data Loaded!");
                } else { alert("Customer Not Found"); }
            });
        }
    </script>
</body>
</html>
