<!DOCTYPE html>
<html>
<head>
    <title>Employee Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Employee Order Management</h2>
            <a href="/admin/logout/" class="btn btn-danger btn-sm">Logout</a>
        </div>
        
        <div class="card p-3 mb-4 bg-white shadow-sm">
            <h6 class="fw-bold text-secondary mb-2">Old Customer Search Box</h6>
            <div class="input-group">
                <input type="text" id="searchPhone" class="form-control" placeholder="Enter customer phone number...">
                <button onclick="searchCustomer()" class="btn btn-dark fw-bold">Search</button>
            </div>
        </div>

        <div class="card p-4 bg-white shadow-sm mb-4">
            <h5 class="mb-3 fw-bold">Punch New Entry</h5>
            <form method="POST">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <input type="text" id="c_name" name="customer_name" class="form-control" placeholder="Customer Name" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <input type="text" id="phone1" name="phone1" class="form-control" placeholder="Phone Number" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <input type="text" id="c_addr_line" name="address" class="form-control" placeholder="Full Address">
                    </div>
                </div>
                <button type="submit" class="btn btn-success fw-bold">Save Order Entry</button>
            </form>
        </div>
    </div>

    <script>
        function searchCustomer() {
            const phone = document.getElementById('searchPhone').value;
            fetch(`?action=search_phone&phone=${phone}`, { headers: {'X-Requested-With': 'XMLHttpRequest'}})
            .then(r => r.json()).then(d => {
                if(d.status === 'success') {
                    document.getElementById('c_name').value = d.name;
                    document.getElementById('c_addr_line').value = d.address;
                    document.getElementById('phone1').value = phone;
                    alert("Customer data safely auto-filled!");
                } else { 
                    alert("No previous customer found with this number."); 
                }
            });
        }
    </script>
</body>
</html>
