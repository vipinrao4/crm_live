<!DOCTYPE html>
<html>
<head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
    <div class="container mt-4">
        <div class="card p-3 mb-3 bg-light">
            <input type="text" id="searchPhone" class="form-control" placeholder="Search phone...">
            <button onclick="searchCustomer()" class="btn btn-primary mt-2">Search</button>
        </div>
        <form method="POST">
            {% csrf_token %}
            <input type="text" id="c_name" name="customer_name" placeholder="Name" required class="form-control">
            <input type="text" id="phone1" name="phone1" placeholder="Phone" class="form-control">
            <button type="submit" class="btn btn-success mt-2">Save Order</button>
        </form>
    </div>
    <script>
        function searchCustomer() {
            const phone = document.getElementById('searchPhone').value;
            fetch(`?action=search_phone&phone=${phone}`, { headers: {'X-Requested-With': 'XMLHttpRequest'}})
            .then(r => r.json()).then(d => {
                if(d.status === 'success') {
                    document.getElementById('c_name').value = d.name;
                    document.getElementById('phone1').value = phone;
                } else { alert("Not Found"); }
            });
        }
    </script>
</body>
</html>
