<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard - Divjot CRM</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #f4f6f9; color: #333; padding: 25px; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .badge-green { background-color: #28a745; color: white; padding: 4px 10px; border-radius: 4px; font-size: 14px; font-weight: bold; }
        
        .grid-layout { display: grid; grid-template-columns: 1.2fr 1fr; gap: 25px; align-items: start; }
        @media (max-width: 992px) { .grid-layout { grid-template-columns: 1fr; } }
        
        .panel { background: white; border: 1px solid #ced4da; border-radius: 8px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .panel-title { font-size: 16px; font-weight: bold; color: #0056b3; margin-bottom: 15px; }
        
        .search-box { border: 1px dashed #007bff; background-color: #f1f7ff; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        .flex-row { display: flex; gap: 10px; }
        .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 12px; }
        
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #444; }
        input, select { width: 100%; padding: 8px 12px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; }
        
        .product-box { background-color: #f8f9fa; border: 1px solid #e1e4e8; padding: 12px; border-radius: 6px; margin-bottom: 10px; }
        .product-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; }
        
        .total-strip { background-color: #23272a; color: white; padding: 12px; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; border-radius: 4px; margin-top: 15px; margin-bottom: 15px; }
        .btn-submit { color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; font-weight: bold; font-size: 15px; cursor: pointer; }
        
        .orders-list-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 15px; }
        .orders-list-table th { background: #f1f3f5; padding: 8px; border-bottom: 2px solid #ccc; font-weight: bold; }
        .orders-list-table td { padding: 8px; border-bottom: 1px solid #eee; }
        
        .status-pill { padding: 3px 6px; border-radius: 4px; font-weight: bold; display: inline-block; margin-bottom: 4px; }
        .pill-generated { background-color: #d4edda; color: #155724; }
        .pill-cancel { background-color: #f8d7da; color: #721c24; }
        .pill-pending { background-color: #fff3cd; color: #856404; }
        
        .edit-link { display: inline-block; color: #007bff; text-decoration: none; font-weight: bold; margin-left: 5px; }
        .edit-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header-bar">
        <h2>Employee Dashboard</h2>
        <div>
            <span class="badge-green">Logged in: {{ request.user.username }}</span> | 
            <a href="{% url 'logout' %}" style="color: #dc3545; font-weight: bold; text-decoration: none; font-size: 14px;">Logout</a>
        </div>
    </div>

    <div class="grid-layout">
        
        <div>
            {% if not is_edit_mode %}
            <div class="search-box">
                <label style="color: #0056b3;">Check Past Customer (Phone Number)</label>
                <div class="flex-row">
                    <input type="text" id="cust_search_phone" maxlength="10" placeholder="Enter phone 1 to check repeat..." oninput="validatePhoneInput(this)">
                    <button class="btn-blue" style="background:#007bff; color:white; border:none; padding:8px 12px; border-radius:4px; cursor:pointer;">Search</button>
                </div>
            </div>
            {% endif %}

            <div class="panel">
                <div class="panel-title" style="color: {% if is_edit_mode %}#e67e22{% else %}#0056b3{% endif %};">
                    {% if is_edit_mode %} ⚠️ Editing Order ID: #{{ order.id }} <a href="{% url 'dashboard' %}" style="float:right; font-size:12px; color:#666;">Cancel Edit</a> {% else %} New Order Form {% endif %}
                </div>
                
                <form method="POST" action="{% if is_edit_mode %}{% url 'edit_order' order.id %}{% else %}{% url 'dashboard' %}{% endif %}">
                    {% csrf_token %}
                    
                    <div style="margin-bottom: 12px;">
                        <label>Name</label>
                        <input type="text" name="name" value="{% if is_edit_mode %}{{ order.customer_name }}{% endif %}" placeholder="Sajara khatun">
                    </div>

                    <div class="form-row-2">
                        <div>
                            <label>Phone Number 1 (10 Digits)*</label>
                            <input type="text" name="phone_1" id="phone_1_input" value="{% if is_edit_mode %}{{ order.phone_1 }}{% endif %}" maxlength="10" pattern="[0-9]{10}" placeholder="Primary 10 digit" required oninput="validatePhoneInput(this)">
                        </div>
                        <div>
                            <label>Phone Number 2 (Alternate)</label>
                            <input type="text" name="phone_2" id="phone_2_input" value="{% if is_edit_mode %}{{ order.phone_2 }}{% endif %}" maxlength="10" pattern="[0-9]{10}" placeholder="Alternate 10 digit" oninput="validatePhoneInput(this)">
                        </div>
                    </div>

                    <div style="margin-bottom: 12px;">
                        <label>Address</label>
                        <input type="text" name="address" value="{% if is_edit_mode %}{{ order.address }}{% endif %}" placeholder="Vill / Street Name">
                    </div>

                    <div style="margin-bottom: 12px;">
                        <label>Pincode (6 digits)*</label>
                        <input type="text" name="pincode" value="{% if is_edit_mode %}{{ order.pincode }}{% else %}226016{% endif %}" required>
                    </div>

                    <div class="form-row-2">
                        <div>
                            <label>Post</label>
                            <select name="post">
                                <option {% if is_edit_mode and order.post_office == 'Indiranagar Sec-14' %}selected{% endif %}>Indiranagar Sec-14</option>
                                <option {% if is_edit_mode and order.post_office == 'Aliganj' %}selected{% endif %}>Aliganj</option>
                            </select>
                        </div>
                        <div>
                            <label>Tehsil</label>
                            <input type="text" name="tehsil" value="{% if is_edit_mode %}{{ order.tehsil }}{% endif %}" placeholder="Enter Tehsil manually">
                        </div>
                    </div>

                    <div class="form-row-2">
                        <div>
                            <label>District</label>
                            <input type="text" name="district" value="Lucknow" readonly style="background:#e9ecef;">
                        </div>
                        <div>
                            <label>State</label>
                            <input type="text" name="state" value="Uttar Pradesh" readonly style="background:#e9ecef;">
                        </div>
                    </div>

                    <label style="margin-top: 15px;">Product Details</label>
                    
                    <div class="product-box">
                        <div class="product-grid">
                            <div>
                                <label>Product 1</label>
                                <select name="product_1" id="p1_select" onchange="updatePrice('1')">
                                    <option value="Asthakesri" {% if is_edit_mode and order.product_1_name == 'Asthakesri' %}selected{% endif %}>Asthakesri</option>
                                    <option value="immunity Bosster" {% if is_edit_mode and order.product_1_name == 'immunity Bosster' %}selected{% endif %}>immunity Bosster</option>
                                    <option value="Gastro Syrup" {% if is_edit_mode and order.product_1_name == 'Gastro Syrup' %}selected{% endif %}>Gastro Syrup</option>
