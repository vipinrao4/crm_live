<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Divjot CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .login-card { max-width: 400px; width: 100%; border: none; border-radius: 12px; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="card login-card shadow-sm p-4 bg-white">
    <div class="text-center mb-4">
        <h3 class="fw-bold text-dark">Divjot CRM</h3>
        <p class="text-muted small">Sign in to access Master Admin Control</p>
    </div>

    {% if form.errors %}
    <div class="alert alert-danger small py-2">
        Username aur password sahi nahi hai. Kripya dobara check karein.
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Username</label>
            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-danger w-100 fw-bold mt-2">Login to Dashboard</button>
    </form>
</div>

</body>
</html>
