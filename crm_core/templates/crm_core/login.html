<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Divjot CRM</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: 8px; border: 1px solid #e1e4e8; width: 100%; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .brand { text-align: center; font-size: 24px; font-weight: bold; color: #23272a; margin-bottom: 5px; }
        .brand span { font-size: 12px; color: #888; font-weight: normal; display: block; margin-top: 5px; }
        .title { text-align: center; font-size: 18px; color: #0056b3; margin-bottom: 25px; font-weight: 600; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 6px; color: #444; }
        input { width: 100%; padding: 10px 14px; border: 1px solid #ced4da; border-radius: 4px; font-size: 14px; }
        input:focus { border-color: #80bdff; outline: none; }
        .btn-login { background-color: #007bff; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 15px; margin-top: 10px; }
        .btn-login:hover { background-color: #0069d9; }
        .error-msg { background-color: #f8d7da; color: #721c24; padding: 10px; border-radius: 4px; font-size: 13px; margin-bottom: 20px; text-align: center; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand">Divjot CRM <span>(Production V25 - Secure)</span></div>
        <div class="title">Employee Login</div>
        
        <form method="POST" action="">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="error-msg">Invalid Username or Password!</div>
            {% endif %}
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
            
            <button type="submit" class="btn-login">Login to Dashboard</button>
        </form>
    </div>

</body>
</html>
