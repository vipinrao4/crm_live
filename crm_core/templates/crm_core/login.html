<!DOCTYPE html>
<html>
<head>
    <title>CRM Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex justify-content-center align-items-center vh-100 bg-light">
    <form method="POST" class="card p-4 shadow" style="width: 350px;">
        {% csrf_token %}
        <h4 class="text-center mb-4 fw-bold">Divjot CRM</h4>
        
        {% if error %}
        <div class="alert alert-danger p-2 text-center" style="font-size: 14px;">{{ error }}</div>
        {% endif %}
        
        <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
        <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
        <button type="submit" class="btn btn-primary w-100 fw-bold">Login Securely</button>
    </form>
</body>
</html>
